services:

  clipper:
    build:
      context: .
      dockerfile: Dockerfile
    image: stream-clipper:latest
    container_name: clipper
    restart: unless-stopped

    ports:
      # Expose on localhost only — Nginx (or any reverse proxy) sits in front.
      - "127.0.0.1:4242:4242"

    env_file:
      - .env

    volumes:
      # Persist the SQLite database between container restarts / rebuilds
      - clipper-db:/app

      # Persist finished clips
      - clipper-clips:/app/public/clips

      # Persist temp working directory across restarts
      - clipper-temp:/app/temp

      # Persist logs outside the container
      - clipper-logs:/app/logs

    # Limit blast radius if the app misbehaves
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"
        reservations:
          memory: 256m

    # Drop all Linux capabilities that the Node process doesn't need
    cap_drop:
      - ALL

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  clipper-db:
  clipper-clips:
  clipper-temp:
  clipper-logs: